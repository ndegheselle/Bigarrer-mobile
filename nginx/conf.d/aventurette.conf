server {
    listen 80;
    server_name bigarrer.fr api.bigarrer.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bigarrer.fr;

    ssl_certificate /etc/letsencrypt/live/bigarrer.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bigarrer.fr/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name api.bigarrer.fr;

    ssl_certificate /etc/letsencrypt/live/bigarrer.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bigarrer.fr/privkey.pem;

    location / {
        proxy_pass http://api:3000/;  # keep trailing slash

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSockets (PocketBase)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}