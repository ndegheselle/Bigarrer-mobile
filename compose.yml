version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: alpine:latest
    container_name: pocketbase
    working_dir: /app
    volumes:
      - ./pocketbase:/app
    command: ["./pocketbase", "serve", "--http=0.0.0.0:3000"]
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew;
               sleep 12h & wait $${!};
             done"
    restart: unless-stopped